name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  source:
    name: Source checks (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    steps:
      - name: Check out the repository
        uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: "1.3.14"

      - name: Set up just
        uses: extractions/setup-just@v4
        with:
          just-version: "1.56.0"

      - name: Run source checks
        run: just ci

  ansible:
    name: Ansible checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out the repository
        uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          version: "0.11.29"
          enable-cache: false

      - name: Set up just
        uses: extractions/setup-just@v4
        with:
          just-version: "1.56.0"

      - name: Install pinned Ansible tooling
        run: |
          uv venv --python 3.13
          uv pip install ansible-core==2.21.1 ansible-lint==26.6.0

      - name: Validate the workstation playbook
        run: uv run just ansible-check
